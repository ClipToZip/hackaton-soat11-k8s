name: Deploy infra AWS with terraform

# Gatilhos para execução do workflow
on:
  workflow_dispatch:

jobs:
  terraform:
    name: Create AWS infrastructure with Terraform
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.3

      # 3. Configuração das credenciais AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 4. Inicialização do Terraform
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -reconfigure

      # 5. Validação do Terraform
      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      # 6. Planejamento do Terraform
      - name: Terraform Plan
        working-directory: ./terraform
        env:
          TF_VAR_db_name: ${{ secrets.DB_NAME }}
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_db_url: ${{ secrets.DB_URL }}
          TF_VAR_redis_host: ${{ secrets.REDIS_HOST }}
          TF_VAR_cliptozip_events_url: ${{ secrets.CLIPTOZIP_EVENTS_URL }}
          TF_VAR_cliptozip_notifications_url: ${{ secrets.CLIPTOZIP_NOTIFICATIONS_URL }}
          TF_VAR_cliptozip_notifications_name: ${{ secrets.CLIPTOZIP_NOTIFICATIONS_NAME }}
          TF_VAR_s3_bucket_name: ${{ secrets.S3_BUCKET_NAME }}
          TF_VAR_spring_mail_username: ${{ secrets.SPRING_MAIL_USERNAME }}
          TF_VAR_spring_mail_password: ${{ secrets.SPRING_MAIL_PASSWORD }}
          TF_VAR_auth_image_url: ${{ secrets.AUTH_IMAGE_URL }}
          TF_VAR_videosvc_image_url: ${{ secrets.VIDEOSVC_IMAGE_URL }}
          TF_VAR_videoprc_image_url: ${{ secrets.VIDEOPRC_IMAGE_URL }}
          TF_VAR_notification_image_url: ${{ secrets.NOTIFICATION_IMAGE_URL }}
          TF_VAR_aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          TF_VAR_aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: terraform plan -input=false

      # 7. Aplicação do Terraform
      - name: Terraform Apply
        working-directory: ./terraform
        env:
          TF_VAR_db_name: ${{ secrets.DB_NAME }}
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_db_url: ${{ secrets.DB_URL }}
          TF_VAR_redis_host: ${{ secrets.REDIS_HOST }}
          TF_VAR_cliptozip_events_url: ${{ secrets.CLIPTOZIP_EVENTS_URL }}
          TF_VAR_cliptozip_notifications_url: ${{ secrets.CLIPTOZIP_NOTIFICATIONS_URL }}
          TF_VAR_cliptozip_notifications_name: ${{ secrets.CLIPTOZIP_NOTIFICATIONS_NAME }}
          TF_VAR_s3_bucket_name: ${{ secrets.S3_BUCKET_NAME }}
          TF_VAR_spring_mail_username: ${{ secrets.SPRING_MAIL_USERNAME }}
          TF_VAR_spring_mail_password: ${{ secrets.SPRING_MAIL_PASSWORD }}
          TF_VAR_auth_image_url: ${{ secrets.AUTH_IMAGE_URL }}
          TF_VAR_videosvc_image_url: ${{ secrets.VIDEOSVC_IMAGE_URL }}
          TF_VAR_videoprc_image_url: ${{ secrets.VIDEOPRC_IMAGE_URL }}
          TF_VAR_notification_image_url: ${{ secrets.NOTIFICATION_IMAGE_URL }}
          TF_VAR_aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          TF_VAR_aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: terraform apply -auto-approve -input=false


      # 8. Exibir Outputs do Terraform
      - name: Show Terraform Outputs
        working-directory: ./terraform
        run: |
          echo "===================================="
          echo "📋 OUTPUTS DA INFRAESTRUTURA"
          echo "===================================="
          terraform output -json | jq -r '
            "🔐 Auth Service:",
            "   Load Balancer: \(.cliptozip_auth_load_balancer_hostname.value)",
            "",
            "🎬 Video Service:",
            "   Load Balancer: \(.cliptozip_videosvc_load_balancer_hostname.value)",
            "",
            "⚙️  Video Processing:",
            "   Load Balancer: \(.cliptozip_videoprc_load_balancer_hostname.value)",
            "",
            "📧 Notification Service:",
            "   Load Balancer: \(.cliptozip_notification_load_balancer_hostname.value)"
          '
